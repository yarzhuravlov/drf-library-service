services:
  app:
    build:
      context: .
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - ./:/app
    env_file:
      - .env
    depends_on:
      - db
    restart: always

  celery:
    build:
      context: .
      dockerfile: telegram_bot/Dockerfile
    command: celery -A config worker -l INFO
    env_file:
      - .env
    depends_on:
      - app
      - redis
    restart: always

  telegram-bot:
    build:
      context: .
      dockerfile: telegram_bot/Dockerfile
    command: python -m telegram_bot.main
    env_file:
      - .env
    depends_on:
      - app
      - redis
    restart: always
    volumes:
      - ./telegram_bot:/app/telegram_bot

  telegram-worker:
    build:
      context: .
      dockerfile: telegram_bot/Dockerfile
    command: python -m telegram_bot.worker
    env_file:
      - .env
    depends_on:
      - app
      - redis
    restart: always
    volumes:
      - ./telegram_bot:/app/telegram_bot

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./static:/app/static
      - ./media:/app/media
    depends_on:
      - app
    restart: always

  db:
    image: postgres:16-alpine
    volumes:
      - pgdata_library_service:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    env_file:
      - .env
    restart: always

  pgadmin:
    image: dpage/pgadmin4
    env_file:
      - .env
    ports:
      - "5050:80"
    depends_on:
      - db
    volumes:
      - pgadmin_data_library_service:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:latest
    volumes:
      - redis_data_library_service:/data
    restart: always

  redisinsight:
    image: redislabs/redisinsight:latest
    ports:
      - "5540:5540"
    depends_on:
      - redis
    restart: always

volumes:
  pgdata_library_service:
  pgadmin_data_library_service:
  redis_data_library_service:
